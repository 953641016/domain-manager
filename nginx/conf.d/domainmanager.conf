server {
    listen 80;
    listen [::]:80;
    server_name d.fwxg.com;

    # Let's Encrypt ACME challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name d.fwxg.com;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/d.fwxg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/d.fwxg.com/privkey.pem;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (optional but recommended)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 根路径返回403
    location = / {
        return 403;
    }

    # ============================================
    # 域名管家 - 前端静态文件
    # ============================================
    location ^~ /dm/ {
        proxy_pass http://frontend:80/dm/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # 域名管家 - API 代理
    # ============================================
    location ^~ /dm/api/ {
        rewrite ^/dm/api/(.*) /api/v1/$1 break;
        proxy_pass http://backend:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        client_max_body_size 10M;
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
