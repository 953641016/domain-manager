# Nginx 配置 - 域名管家
# 部署在二级目录 /domainmgr/

server {
    listen 80;
    server_name yourcompany.com;
    
    # 访问日志
    access_log /var/log/nginx/domainmgr_access.log;
    error_log /var/log/nginx/domainmgr_error.log;
    
    # ============================================
    # 域名管家 - 前端静态文件
    # ============================================
    location ^~ /domainmgr/ {
        alias /opt/domainmanager/frontend/dist/;
        index index.html;
        
        # SPA 路由支持
        try_files $uri $uri/ /domainmgr/index.html;
        
        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    
    # ============================================
    # 域名管家 - API 代理
    # ============================================
    location ^~ /domainmgr/api/ {
        rewrite ^/domainmgr/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        client_max_body_size 10M;
    }
    
    # ============================================
    # PHP 项目配置（示例）
    # ============================================
    location / {
        root /var/www/html;
        index index.php index.html;
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php-fpm/www.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
